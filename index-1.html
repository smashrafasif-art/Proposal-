<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sinthiya ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:linear-gradient(135deg,#ff9a9e,#fad0c4);height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center}
.card{background:#fff;padding:35px;border-radius:25px;text-align:center;box-shadow:0 15px 35px rgba(0,0,0,.2);max-width:360px;width:92%;position:relative;z-index:2}
h1{font-size:30px;color:#ff2d55;margin-bottom:15px}
p{font-size:18px;color:#555;margin-bottom:20px}
button{padding:14px 28px;font-size:18px;border:none;border-radius:12px;cursor:pointer;margin:8px}
#yes{background:#28a745;color:#fff}
#no{background:#ff3b30;color:#fff;position:absolute}
.heart{position:absolute;font-size:24px;animation:float 8s linear infinite;opacity:.7}
@keyframes float{0%{transform:translateY(100vh)}100%{transform:translateY(-120vh)}}
</style>
</head>
<body>
<div class="card">
<h1>💖 Dear Sinthiya 💖</h1>
<p>Ashraf has one question for you...</p>
<h2 style="margin-bottom:20px;color:#ff2d55;">Will You Be My Wife? 💍❤️</h2>
<button id="yes">Yes ❤️</button>
<button id="no">No 😅</button>
</div>
<script>
const no=document.getElementById('no');
function moveButton(){
  const x=Math.random()*(window.innerWidth-120);
  const y=Math.random()*(window.innerHeight-70);
  no.style.left=x+'px'; no.style.top=y+'px';
}
no.addEventListener('mouseover',moveButton);
no.addEventListener('click',moveButton);
document.getElementById('yes').onclick=function(){
  document.body.innerHTML=`
  <div style="height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;background:#fff0f5;text-align:center;padding:20px;">
  <h1 style="font-size:55px;color:#ff2d55;">YES!! ❤️🥹</h1>
  <h2>Thank You, My Love 💍</h2>
  <p style="font-size:22px;margin-top:20px;max-width:600px;line-height:1.7;">
  Dear Sinthiya,<br><br>
  Today is one of the happiest days of my life.<br>
  I promise to love you, respect you, support you, and stand beside you through every season of life.<br>
  No matter what happens, I will always choose you.<br><br>
  ❤️ Ashraf ❤️
  </p>
  <div style="font-size:40px;margin-top:30px;">💖💖💖🎉🎉💍</div>
  </div>`;
};
for(let i=0;i<30;i++){
  const h=document.createElement('div');
  h.className='heart'; h.innerHTML='❤️';
  h.style.left=Math.random()*100+'vw';
  h.style.animationDuration=(Math.random()*5+5)+'s';
  h.style.fontSize=(Math.random()*20+18)+'px';
  document.body.appendChild(h);
}
</script>
</body>
</html>
